services:
  db:
    image: postgres:17
    container_name: keshav_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keshav}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keshav123}
      POSTGRES_DB: postgres
    ports:
      # TODO: Remove this port exposure in production — DB should only be accessible within app-net
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keshav} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    # TODO: Move to docker-compose.dev.yml only and replace hardcoded credentials with env vars
    #       once the app is stable enough to not require manual DB edits
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-net

  nginx:
    image: nginx:stable-alpine
    container_name: keshav_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
    networks:
      - app-net

  pgbackup:
    image: prodrigestivill/postgres-backup-local
    container_name: keshav_pgbackup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: keshav_kitchen,keshav_kitchen_dev
      POSTGRES_USER: ${POSTGRES_USER:-keshav}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keshav123}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

volumes:
  db_data:
  pgadmin_data:

networks:
  app-net: # 👈 declare custom network
    driver: bridge
