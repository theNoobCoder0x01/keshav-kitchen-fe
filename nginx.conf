events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  sendfile on;
  keepalive_timeout 65;

  # Docker's internal DNS — allows nginx to start even if an upstream container isn't running
  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    server_name _;

    # Serve static public files directly with long cache
    location /public/ {
      alias /usr/share/nginx/html/;
      access_log off;
      expires 30d;
    }

    location = /kitchen {
      return 308 /kitchen/;
    }

    # Production Next.js app at /kitchen/
    location /kitchen/ {
      set $prod_upstream http://keshav_frontend:3002;
      proxy_pass $prod_upstream;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location = /beta-kitchen {
      return 308 /beta-kitchen/;
    }

    # Beta Next.js app at /beta-kitchen/ (built and served with next start, backed by dev DB)
    location /beta-kitchen/ {
      set $beta_upstream http://keshav_frontend_dev:3000;
      proxy_pass $beta_upstream;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Proxy /pgadmin/ to pgadmin
    location /pgadmin/ {
      set $pgadmin_upstream http://pgadmin:80;
      proxy_pass $pgadmin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Home Assistant root
    location / {
        set $homeassistant_upstream http://homeassistant:8123;
        proxy_pass $homeassistant_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # WebSocket path (important)
    location /api/websocket {
        set $homeassistant_upstream http://homeassistant:8123;
        proxy_pass $homeassistant_upstream/api/websocket;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
  }
}
